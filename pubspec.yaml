name: retroscape_modern
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.1.0
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  path_provider: ^2.1.2
  path: ^1.8.3
  crypto: ^3.0.3
  xml: ^6.5.0
  easy_localization: ^3.0.3
  logger: ^2.0.2+1
  file_picker: ^6.1.1
  collection: ^1.18.0
  archive: ^3.4.10
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
